name: Build SellPlugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Java environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build the project using Maven
      # This runs the 'package' command to create the JAR
      - name: Build with Maven
        run: mvn -B package --file pom.xml

      # 4. Upload the finished .jar so you can download it
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SellPlugin-Finished-Jar
          path: target/*.jar
